<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Galerija radova Modus Domus – sobe i ormari, kuhinje i moderni dnevni prostori.">
  <title>Galerija | Modus Domus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
  <header class="gallery-header">
    <a href="index.html" class="gallery-brand"><img src="assets/logo-modus-domus-transparent.png" alt="Modus Domus"></a>
    <a class="back-link" href="index.html#projects" data-g18n="back">← Povratak na početnu</a>
    <div class="gallery-languages">
      <button class="gallery-lang active" data-lang="hr">HR</button>
      <button class="gallery-lang" data-lang="en">EN</button>
      <button class="gallery-lang" data-lang="de">DE</button>
    </div>
  </header>

  <main>
    <section class="gallery-hero">
      <p class="gallery-kicker" data-g18n="kicker">ODABRANI RADOVI</p>
      <h1 data-g18n="title">Galerija namještaja po mjeri</h1>
      <p data-g18n="intro">Fotografije su prikazane u izvornom omjeru, bez rastezanja i nepotrebnog rezanja.</p>
    </section>

    <nav class="gallery-filter" aria-label="Kategorije galerije">
      <button class="gallery-filter-button active" data-filter="all" data-g18n="filterAll">Svi radovi</button>
      <button class="gallery-filter-button" data-filter="sobe" data-g18n="filterRooms">Sobe i ormari</button>
      <button class="gallery-filter-button" data-filter="kuhinje" data-g18n="filterKitchens">Kuhinje</button>
      <button class="gallery-filter-button" data-filter="dnevni" data-g18n="filterLiving">Dnevni prostori</button>
    </nav>

    <section id="sobe" class="gallery-section" data-category="sobe">
      <div class="gallery-section-head">
        <span>01</span>
        <h2 data-g18n="rooms">Sobe i ormari po mjeri</h2>
      </div>
      <div class="masonry">
        <button class="gallery-photo" data-full="assets/gallery/sobe-1.jpg"><img src="assets/gallery/sobe-1.jpg" alt="Ormar po mjeri"></button>
        <button class="gallery-photo" data-full="assets/gallery/sobe-2.jpg"><img src="assets/gallery/sobe-2.jpg" alt="Ugradbeni ormar"></button>
        <button class="gallery-photo" data-full="assets/gallery/sobe-3.jpg"><img src="assets/gallery/sobe-3.jpg" alt="Klizni ormar"></button>
        <button class="gallery-photo" data-full="assets/gallery/sobe-4.jpg"><img src="assets/gallery/sobe-4.jpg" alt="Soba i ormar po mjeri"></button>
        
        <button class="gallery-photo" data-full="assets/gallery/sobe-6.jpg"><img src="assets/gallery/sobe-6.jpg" alt="Unutrašnjost garderobnog ormara"></button>
        <button class="gallery-photo" data-full="assets/gallery/sobe-7.jpg"><img src="assets/gallery/sobe-7.jpg" alt="Ormar i ormarić za ulazni prostor"></button>
        <button class="gallery-photo" data-full="assets/gallery/sobe-8.jpg"><img src="assets/gallery/sobe-8.jpg" alt="Ugradbeni ormar u spavaćoj sobi"></button>
        <button class="gallery-photo" data-full="assets/gallery/sobe-9.jpg"><img src="assets/gallery/sobe-9.jpg" alt="Moderan ormar po mjeri"></button>
      </div>
    </section>

    <section id="kuhinje" class="gallery-section" data-category="kuhinje">
      <div class="gallery-section-head">
        <span>02</span>
        <h2 data-g18n="kitchens">Kuhinje po mjeri</h2>
      </div>
      <div class="masonry">
        <button class="gallery-photo" data-full="assets/gallery/kuhinja-1.jpg"><img src="assets/gallery/kuhinja-1.jpg" alt="Moderna kuhinja"></button>
        <button class="gallery-photo" data-full="assets/gallery/kuhinja-2.jpg"><img src="assets/gallery/kuhinja-2.jpg" alt="Kutna kuhinja"></button>
        <button class="gallery-photo" data-full="assets/gallery/kuhinja-3.jpg"><img src="assets/gallery/kuhinja-3.jpg" alt="Kuhinja s poluotokom"></button>
        <button class="gallery-photo" data-full="assets/gallery/kuhinja-4.jpg"><img src="assets/gallery/kuhinja-4.jpg" alt="Kompaktna kuhinja"></button>
        <button class="gallery-photo" data-full="assets/gallery/kuhinja-5.jpg"><img src="assets/gallery/kuhinja-5.jpg" alt="Linearna kuhinja po mjeri"></button>
      </div>
    </section>

    <section id="dnevni" class="gallery-section" data-category="dnevni">
      <div class="gallery-section-head">
        <span>03</span>
        <h2 data-g18n="living">Moderni dnevni prostori</h2>
      </div>
      <div class="masonry">
        <button class="gallery-photo" data-full="assets/gallery/dnevni-1.jpg"><img src="assets/gallery/dnevni-1.jpg" alt="Moderan TV zid"></button>
        <button class="gallery-photo" data-full="assets/gallery/dnevni-2.jpg"><img src="assets/gallery/dnevni-2.jpg" alt="TV element po mjeri"></button>
        <button class="gallery-photo" data-full="assets/gallery/dnevni-3.jpg"><img src="assets/gallery/dnevni-3.jpg" alt="Dnevni prostor s drvenim detaljima"></button>
        <button class="gallery-photo" data-full="assets/gallery/dnevni-4.jpg"><img src="assets/gallery/dnevni-4.jpg" alt="Kompletan dnevni prostor"></button>
        <button class="gallery-photo" data-full="assets/gallery/dnevni-5.jpg"><img src="assets/gallery/dnevni-5.jpg" alt="Zidni element za dnevni boravak"></button>
      </div>
    </section>

    <section class="gallery-contact">
      <h2 data-g18n="ctaTitle">Imate ideju za svoj prostor?</h2>
      <a href="index.html#contact" data-g18n="cta">Kontaktirajte nas →</a>
    </section>
  </main>

  <div class="gallery-lightbox" id="galleryLightbox" aria-hidden="true">
    <button class="gallery-lightbox-close" aria-label="Zatvori">×</button>
    <img src="" alt="Povećani prikaz projekta">
  </div>

  <script src="gallery.js"></script>
</body>
</html>
